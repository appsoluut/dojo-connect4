name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  TEST_TAG: appsoluut/dojo-connect4:test
  CONTAINER_TAG: appsoluut/dojo-connect4
  REGISTRY: ghcr.io
  CONTEXT: .

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper missing. Generating..."
            gradle wrapper --gradle-version 8.10
          fi
          chmod +x gradlew

      - name: Run Ktlint
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        if: always()
        run: ./gradlew detekt

      - name: Build and run tests
        if: always()
        run: ./gradlew build test jacocoTestReport

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false

      - name: Upload coverage to DeepSource
        if: always() # always run even if the previous step fails
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          # Tests have finished and a test coverage report is available
          # Install deepsource CLI
            curl https://deepsource.io/cli | sh
          # From the root directory, run the report coverage command
            ./bin/deepsource report --analyzer test-coverage --key kotlin --value-file build/reports/jacoco/test/jacocoTestReport.xml

  docker:
    name: Create and test signed Docker images
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    steps:
      - name: Login to Docker Github
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build and export to Docker
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          load: true
          tags: ${{ env.TEST_TAG }}

      - name: Test Docker image
        run: |
          echo q | docker run --rm -i ${{ env.TEST_TAG }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.CONTAINER_TAG }}

      - name: Build and push to registry
        id: push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: ${{ env.CONTEXT }}
          push: true
          tags: ghcr.io/${{ env.CONTAINER_TAG }}:latest,${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image:  ${{ steps.meta.outputs.tags }}
          args: --file=${{ env.CONTEXT }}/Dockerfile
        continue-on-error: true # No paid snyk account to actually upload the report

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.CONTAINER_TAG }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
